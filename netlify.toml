[build]
  command = "npm --prefix subprojects/gxm ci && npm run build"
  publish = "dist"

[[redirects]]
  from = "/projects/gxm"
  to = "/projects/gxm/index.html"
  status = 200

[[redirects]]
  from = "/projects/gxm/"
  to = "/projects/gxm/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/projects/gxm/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
